# Default Ruff configuration
line-length = 88
target-version = "py312"

[lint]
select = ["E", "F", "I", "N", "UP", "B", "A", "C4", "PT", "RET", "SIM", "PLC", "PLE", "PLW", "RUF", "ANN", "TC"]
ignore = []

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
